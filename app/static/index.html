<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Advisor - 智能旅行推荐</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <div class="app">
    <header class="header">
      <h1>🌍 Travel Advisor</h1>
      <span class="subtitle">智能旅行推荐助手</span>
    </header>

    <div class="chat-container" ref="chatContainer">
      <div v-if="messages.length === 0" class="welcome">
        <div class="welcome-icon">✈️</div>
        <h2>你好！想去哪里旅行？</h2>
        <p>告诉我你的偏好——目的地类型、预算、季节、兴趣……我会帮你找到最合适的旅行方案。</p>
        <div class="quick-prompts">
          <button
            v-for="prompt in quickPrompts"
            :key="prompt.label"
            class="prompt-chip"
            @click="sendQuickPrompt(prompt.text)"
          >{{ prompt.label }}</button>
        </div>
      </div>

      <div class="messages">
        <template v-for="(item, idx) in messages" :key="idx">
          <div v-if="item.role === 'tool'" class="tool-event" :class="{ result: item.done }">
            <span class="icon">{{ getToolIcon(item.toolName) }}</span>
            {{ item.content }}
          </div>
          <div
            v-else
            class="message"
            :class="[item.role, { streaming: item.streaming }]"
          >{{ item.content }}</div>
        </template>
      </div>
    </div>

    <form class="input-bar" @submit.prevent="handleSend">
      <input
        type="text"
        v-model="inputText"
        placeholder="描述你的旅行偏好……"
        autocomplete="off"
        :disabled="isStreaming"
      />
      <button type="submit" :disabled="isStreaming || !inputText.trim()">发送</button>
    </form>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/chat.js"></script>
</body>
</html>
